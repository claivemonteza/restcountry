<mat-toolbar fxFlexLayout="row wrap" fxLayoutGap="20px">
    <div class='left'>
        <h1>REST Countries</h1>
        <ul>
            <li><a class="fa fa-github" href='https://github.com/claivemonteza/angularcountries.git'>View the project</a>
            </li>
        </ul>
    </div>
    <mat-form-field>
        <mat-label>Search</mat-label>
        <mat-icon matPrefix>search</mat-icon>
        <input matInput (keyup)="applyFilter($event.target.value)" placeholder="">
    </mat-form-field>
    <div fxFlexLayout="row" fxLayoutAlign="center">
        <button mat-stroked-button [matMenuTriggerFor]="menu">Export
            <mat-icon class="menuicon">keyboard_arrow_down</mat-icon>
        </button>
        <mat-menu #menu="matMenu">
            <button mat-menu-item (click)="exportAsXLSX()">Excel</button>
            <button mat-menu-item (click)="exportAsCSV()">CSV</button>
            <button mat-menu-item (click)="exportAsXML()">XML</button>
        </mat-menu>
    </div>
</mat-toolbar>

<div class="container">
    <table mat-table [dataSource]="dataSource">
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Name </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <ng-container matColumnDef="capital">
            <th mat-header-cell *matHeaderCellDef> Capital </th>
            <td mat-cell *matCellDef="let element"> {{element.capital}} </td>
        </ng-container>

        <ng-container matColumnDef="population">
            <th mat-header-cell *matHeaderCellDef> Population </th>
            <td mat-cell *matCellDef="let element"> {{element.population}} </td>
        </ng-container>

        <ng-container matColumnDef="area">
            <th mat-header-cell *matHeaderCellDef> Area </th>
            <td mat-cell *matCellDef="let element"> {{element.area}} </td>
        </ng-container>

        <ng-container matColumnDef="flag">
            <th mat-header-cell *matHeaderCellDef> Flag </th>
            <td mat-cell *matCellDef="let element"> <img src="{{element.flag}}" alt="" width="50" height="40" srcset="">
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns;"></tr>
        <tr mat-row (click)="openDialog(row)" *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
</div>
